<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON DO | 2026</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="sparkle-header">APRIL 2026</h1>

    <div class="calc-btn-toggle" onclick="toggleCalc()">🧮</div>

    <div id="calc-sidebar">
        <h2 style="color:var(--neon-lime); text-align: center;">NEON CALC</h2>
        <div class="calc-display">0.00</div>
        <button onclick="toggleCalc()" class="close-btn">CLOSE</button>
    </div>

    <div class="calendar-container">
        <div class="weekday-headers">
            <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div>
            <div>Thu</div><div>Fri</div><div>Sat</div>
        </div>

        <div class="calendar-grid" id="calendar"></div>
    </div>

    <div class="input-panel">
        <div class="input-row">
            <select id="daySelect"></select>
            <select id="typeSelect">
                <option value="task">TASK (LIME)</option>
                <option value="bill">BILL (GOLD)</option>
                <option value="event">EVENT (CYAN)</option>
            </select>
        </div>
        <input type="text" id="taskInput" placeholder="Organize your life in color...">
        <button onclick="addTask()" class="add-btn">ADD TO LIFE</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
