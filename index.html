<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Life Organizer 2026</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="sparkle-header" id="monthDisplay">APRIL 2026</h1>

    <div class="calc-btn-toggle" onclick="toggleCalc()">🧮</div>

    <div id="calc-sidebar">
        <h2 style="color:var(--neon-lime); text-align: center;">NEON CALC</h2>
        <div style="background: #222; padding: 15px; border-radius: 10px; border: 1px solid var(--neon-cyan); height: 300px; display: flex; align-items: center; justify-content: center;">
            <p style="color: #666; font-size: 12px; text-align: center;">[ Calculator Interface Loading... ]</p>
        </div>
        <button onclick="toggleCalc()" style="width: 100%; margin-top: 20px; background: var(--neon-pink); border: none; padding: 10px; font-weight: bold; border-radius: 5px; cursor: pointer;">CLOSE</button>
    </div>

    <div class="calendar-grid" id="calendar">
        </div>

    <div style="background: #111; padding: 30px; border-top: 5px solid var(--neon-pink); margin-top: 20px; display: flex; flex-direction: column; gap: 15px; align-items: center;">
        
        <div style="display: flex; gap: 10px; width: 100%; max-width: 500px;">
            <select id="daySelect" style="background: #000; color: var(--neon-cyan); border: 2px solid var(--neon-cyan); padding: 10px; border-radius: 8px; flex: 1;">
                </select>
            
            <select id="typeSelect" style="background: #000; color: var(--neon-gold); border: 2px solid var(--neon-gold); padding: 10px; border-radius: 8px; flex: 1;">
                <option value="task">TASK (LIME)</option>
                <option value="bill">BILL (GOLD)</option>
                <option value="event">EVENT (CYAN)</option>
            </select>
        </div>

        <input type="text" id="taskInput" placeholder="What are we organizing today?" 
               style="width: 100%; max-width: 500px; background: #000; color: white; border: 2px solid var(--neon-pink); padding: 15px; border-radius: 8px; box-shadow: 0 0 10px var(--neon-pink); outline: none;">
        
        <button onclick="addTask()" 
                style="width: 100%; max-width: 500px; background: var(--neon-lime); color: black; font-weight: 900; padding: 15px; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 20px var(--neon-lime);">
            ADD TO LIFE
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
