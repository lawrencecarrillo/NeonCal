<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Glitter Organizer</title>
    <style>
        /* 1. The Dark "Anti-Bank" Background */
        body {
            background-color: #0a0a0a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #fff;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; /* Neon Pink Glow */
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        /* 2. The Task Container */
        .task-list {
            width: 100%;
            max-width: 400px;
        }

        .task-item {
            background: #1a1a1a;
            border: 2px solid #00ffff; /* Neon Cyan */
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        /* 3. The Strike-Through Logic */
        .task-item.completed {
            border-color: #555;
            box-shadow: none;
            opacity: 0.6;
        }

        .task-item.completed .text {
            text-decoration: line-through;
            text-decoration-color: #ff00ff; /* Pink strike line */
            text-decoration-thickness: 3px;
        }

        /* 4. The Glitter/Sparkle Effect (CSS Animation) */
        .sparkle {
            position: absolute;
            background: white;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
        }

        @keyframes glitter-burst {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        /* 5. The Diagonal Day Strike */
        .day-box {
            width: 100px;
            height: 100px;
            border: 2px solid #333;
            position: relative;
        }

        .day-box.done::after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 141%; /* Math for diagonal of a square */
            height: 4px;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            transform: rotate(45deg);
            transform-origin: top left;
            box-shadow: 0 0 10px white;
        }
    </style>
</head>
<body>

    <h1>Organizer</h1>

    <div class="task-list">
        <div class="task-item" onclick="toggleTask(this)">
            <span class="text">Pay Electric Bill ($120)</span>
        </div>
        <div class="task-item" onclick="toggleTask(this)">
            <span class="text">Finalize App Design</span>
        </div>
    </div>

    <script>
        function toggleTask(element) {
            element.classList.toggle('completed');
            
            // Trigger simple sparkle logic
            if(element.classList.contains('completed')) {
                console.log("Task Sparkled!");
                // You can add a library like 'canvas-confetti' here later
            }
        }
    </script>
</body>
</html>
