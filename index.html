<div class="theme-switcher">
    <button class="theme-btn" style="background:#ff00ff" onclick="setTheme('neon')">NEON</button>
    <button class="theme-btn" style="background:#fff; color:#000" onclick="setTheme('primary')">PRIMARY</button>
    <button class="theme-btn" style="background:#3e2723; color:#fff" onclick="setTheme('bank')">BANK</button>
</div>

<h1 class="sparkle-header" id="headerTitle">APRIL 2026</h1>

<div class="calendar-grid" id="calendar"></div>

<div class="input-panel">
    <select id="daySelect"></select>
    <select id="typeSelect">
        <option value="task">TASK</option>
        <option value="bill">BILL</option>
    </select>
    
    <input type="text" id="taskInput" placeholder="What's the plan?">

    <select id="recurrenceSelect" style="padding: 10px; border-radius: 8px;">
        <option value="none">ONE TIME ONLY</option>
        <option value="7">WEEKLY</option>
        <option value="14">BI-WEEKLY</option>
        <option value="30">MONTHLY</option>
    </select>

    <button onclick="addTask()" class="add-btn">ADD TO LIFE</button>
</div>
