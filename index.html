<h1 class="sparkle-header">APRIL 2026</h1>

<div class="calc-btn-toggle" onclick="toggleCalc()">🧮</div>

<div id="calc-sidebar">
    <h2 style="color:var(--neon-cyan)">NEON CALC</h2>
    <p>Calculator coming soon...</p>
    <button onclick="toggleCalc()">CLOSE</button>
</div>

<div class="calendar-grid" id="calendar"></div>

<div style="background: #111; padding: 20px; border-top: 5px solid var(--neon-pink);">
    <select id="daySelect">
        <option value="8">Day 8</option>
    </select>
    
    <select id="typeSelect">
        <option value="task">TASK (LIME)</option>
        <option value="bill">BILL (GOLD)</option>
        <option value="event">EVENT (CYAN)</option>
    </select>
    
    <input type="text" id="taskInput" placeholder="What's the tea?">
    <button onclick="addTask()" style="background:var(--neon-pink); padding: 10px;">ADD TO LIFE</button>
</div>
