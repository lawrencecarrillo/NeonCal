<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON DO | AI Life Organizer</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-neon">

    <div class="theme-switcher">
        <button class="theme-btn neon-btn" onclick="setTheme('neon')">NEON</button>
        <button class="theme-btn primary-btn" onclick="setTheme('primary')">PRIMARY</button>
        <button class="theme-btn bank-btn" onclick="setTheme('bank')">BANK</button>
    </div>

    <div class="header-nav">
        <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
        <h1 id="mainHeader" class="sparkle-text">APRIL 2026</h1>
        <button class="nav-btn" onclick="changeMonth(1)">▶</button>
    </div>

    <div class="calendar-container">
        <div class="weekday-headers">
            <div>SUN</div><div>MON</div><div>TUE</div><div>WED</div>
            <div>THU</div><div>FRI</div><div>SAT</div>
        </div>
        <div class="calendar-grid" id="calendar"></div>
    </div>

    <div class="input-panel">
        <div id="ai-status">● AI PERSISTENT MEMORY ACTIVE</div>
        
        <div class="input-selectors">
            <select id="daySelect"></select>
            <select id="recurrenceSelect">
                <option value="0">ONE TIME</option>
                <option value="7">WEEKLY</option>
                <option value="14">BI-WEEKLY</option>
                <option value="30">MONTHLY</option>
            </select>
        </div>

        <input type="text" id="taskInput" placeholder="Try: 'Rent $2000' or 'Meet with Team'...">
        
        <button onclick="addTask()" class="main-add-btn">ADD TO LIFE</button>
        <p class="hint-text">Data is automatically saved to your device.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
